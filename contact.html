<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Discover elegant perfumes for men and women. Explore timeless fragrances, luxury scents, and signature aromas crafted to match every style and occasion.">

    <title>Yahya | Contact</title>
    <!-- add logo with title -->
    <link rel="icon" type="image/x-icon" href="assets/images/logo-website.png">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="d-flex flex-column min-vh-100">
    <!-- Navbar -->
    <nav id="navbar" class="navbar navbar-expand-lg fixed-top" data-bs-theme="dark">
        <div class="container">
            <!-- Logo -->
            <a class="navbar-brand" href="index.html">
                <i class="fa-brands fa-yoast logo"></i>
            </a>

            <!-- Mobile toggle button -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup"
                aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Navbar links -->
            <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                <div class="navbar-nav ms-auto gap-lg-4 ">
                    <a class="nav-link" href="index.html">Home</a>
                    <a class="nav-link" href="products.html">Products</a>
                    <a class="nav-link active" href="contact.html">Contact</a>
                </div>
            </div>
        </div>
    </nav>
    <main>
        <section id="booking-form" class="container-fluid p-0 section mt-5">
            <div class="col-12 text-center">
                <h2 class="display-6 py-3 mb-5">Hello... I have an inquiry about</h2>
            </div>

            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-12 col-md-10 col-lg-8">
                        <form action="success.html" method="get">
                            <div class="row">
                                <div class="col-12 col-lg-4 mb-3">
                                    <label for="name" class="form-label">Name</label>
                                    <input class="form-control" id="name" name="name" type="text" required>
                                </div>
                                <div class="col-12 col-lg-4 mb-3">
                                    <label for="email" class="form-label">Email</label>
                                    <input class="form-control" id="email" name="email" type="email" required>
                                </div>
                                <div class="col-12 col-lg-4 mb-3">
                                    <label for="phone" class="form-label">Phone number</label>
                                    <input class="form-control" id="phone" name="phone" type="tel" required>
                                </div>
                                <div class="col-12 mb-3">
                                    <label for="event-type" class="form-label">Inquiry Type</label>
                                    <select id="event-type" class="form-select" name="event-type" required>
                                        <option value="" selected disabled>Select an option</option>
                                        <option value="mens">Men's Perfumes</option>
                                        <option value="womens">Women's Perfumes</option>
                                        <option value="unisex">Unisex Perfumes</option>
                                        <option value="complaint">Complaint/Feedback</option>
                                    </select>
                                </div>
                                <div class="col-12 mb-4">
                                    <label for="message" class="form-label">Message</label>
                                    <textarea class="form-control" rows="6" id="message" name="message"
                                        required></textarea>
                                </div>
                            </div>
                            <div class="mb-5 text-center">
                                <button type="submit" class="btn btn-dark btn-lg px-5">Submit</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <!-- Footer -->
    <!-- mt-auto add to push footer to the bottom of the page-->
    <footer id="contact" class="mt-auto">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 text-center">
                    <h2 class="display-6 ">Contact Us</h2>
                </div>
                <!-- Contact info -->
                <div class="col-12 col-md-6 col-xl-4">
                    <h3 class="sub-heading-color">Contact Info</h3>
                    <address>
                        <p><i class="fa-solid fa-location-dot"></i> <b>12 yahya Lane</b><br>
                            Stourbridge City, <br>
                            West Midland DY9 9BZ</br>
                    </address>
                    <p><i class="fa-solid fa-phone"></i> 013 4567-8901<br>
                        <i class="fa-regular fa-paper-plane"></i>info@yahya.com
                    </p>
                    <div class="social-links my-4 ">
                        <a href="https://www.facebook.com/" target="_blank" class="me-3" rel="noopener"><i
                                class="fa-brands fa-facebook fa-2x"></i></a>
                        <a href="https://twitter.com/" target="_blank" class="me-3" rel="noopener"><i
                                class="fa-brands fa-twitter fa-2x"></i></a>
                        <a href="https://www.instagram.com/" target="_blank" class="me-3" rel="noopener"><i
                                class="fa-brands fa-instagram fa-2x"></i></a>
                    </div>
                </div>
                <!-- Opening time -->
                <div class="col-12 col-md-6 col-xl-4">
                    <h3 class="sub-heading-color">Opening time</h3>
                    <table class="table table-transparent">
                        <thead>
                            <tr>
                                <th scope="col">Day</th>
                                <th scope="col">Open</th>
                                <th scope="col">Close</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <th scope="row">Mon</th>
                                <td>11AM</td>
                                <td>12PM</td>
                            </tr>
                            <tr>
                                <th scope="row">Tue-Thru</th>
                                <td>11AM</td>
                                <td>12PM</td>
                            </tr>
                            <tr>
                                <th scope="row">Fri-Sat</th>
                                <td>11AM</td>
                                <td>12PM</td>
                            </tr>
                            <tr>
                                <th scope="row">Sun</th>
                                <td>11AM</td>
                                <td>12PM</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

            </div>
        </div>
    </footer>
    <script src="https://kit.fontawesome.com/9922ec3484.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>

</body>

</html>
